<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>核心指标拆解分析</title>
  <style>
    :root {
      --bg: #f7f8fa;
      --surface: #ffffff;
      --surface-soft: #fbfbfc;
      --text: #1f2329;
      --text-secondary: #646a73;
      --text-muted: #8f959e;
      --positive: #e64a4f;
      --negative: #5b9b45;
      --yellow: #ffd400;
      --orange: #ff6a00;
      --red: #ef3f2d;
      --badge: #f56c78;
      --line: #dfe3e8;
      --line-soft: #eef0f3;
      --shadow: 0 7px 24px rgba(31, 35, 41, 0.055);
      --radius: 10px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }

    html, body { margin: 0; min-width: 320px; background: var(--bg); color: var(--text); }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% -20%, rgba(255, 212, 0, 0.09), transparent 35%),
        linear-gradient(180deg, #f6f7f9 0%, #f9fafb 100%);
    }

    button, input, select, textarea { font: inherit; }

    .report-shell {
      width: 100%;
      min-height: 100vh;
      padding: 24px 28px 18px;
      display: flex;
      flex-direction: column;
    }

    .report-header {
      min-height: 58px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      flex: 0 0 auto;
    }

    .eyebrow {
      margin: 0 0 3px;
      color: var(--text-muted);
      font-size: 11px;
      line-height: 1;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 1.55vw, 30px);
      line-height: 1.25;
      font-weight: 700;
      letter-spacing: -0.025em;
    }

    .subtitle {
      margin: 5px 0 0;
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1.4;
    }

    .platform-legend {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 8px;
      border: 1px solid rgba(223, 227, 232, 0.78);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 4px 14px rgba(31, 35, 41, 0.035);
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--text-secondary);
      font-size: 11px;
      white-space: nowrap;
    }

    .platform-mark {
      width: 25px;
      height: 25px;
      border-radius: 7px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #1f2329;
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
      flex: 0 0 auto;
      box-shadow: inset 0 0 0 1px rgba(31, 35, 41, 0.05);
    }

    .platform-mark.rabbit { background: var(--yellow); border-radius: 9px 9px 11px 11px; }
    .platform-mark.square { background: var(--orange); color: #fff; border-radius: 6px; }
    .platform-mark.circle { background: var(--red); color: #fff; border-radius: 50%; }

    .metric-tree {
      width: 100%;
      max-width: 1900px;
      margin: 0 auto;
      display: grid;
      gap: 10px;
      flex: 1 1 auto;
      align-content: start;
    }

    .root-wrap { display: flex; justify-content: center; }

    .summary-card,
    .metric-group,
    .platform-card,
    .funnel-lane {
      border: 1px solid rgba(223, 227, 232, 0.72);
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .summary-card {
      min-height: 64px;
      padding: 12px 18px;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .summary-card.root-card {
      width: min(520px, 46vw);
      min-height: 70px;
      background: linear-gradient(135deg, #ffffff 0%, #fffdf2 100%);
      border-color: rgba(255, 212, 0, 0.34);
      box-shadow: 0 10px 32px rgba(70, 60, 10, 0.07);
    }

    .summary-card.branch-card { min-height: 58px; border-radius: 8px; }

    .summary-label {
      color: var(--text-secondary);
      font-size: 16px;
      white-space: nowrap;
    }

    .root-card .summary-label { font-size: 17px; }

    .summary-value {
      font-size: clamp(24px, 1.65vw, 32px);
      line-height: 1;
      font-weight: 650;
      letter-spacing: -0.025em;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .branch-card .summary-value { font-size: clamp(22px, 1.45vw, 29px); }

    .delta {
      font-size: 13px;
      line-height: 1.25;
      white-space: nowrap;
    }

    .delta::before { content: "对比差值 "; }
    .delta.positive { color: var(--positive); }
    .delta.negative { color: var(--negative); }
    .delta.neutral { color: var(--text-muted); }

    .tree-connectors {
      position: relative;
      height: 18px;
      pointer-events: none;
    }

    .root-connectors::before {
      content: "";
      position: absolute;
      top: 0;
      left: 50%;
      height: 9px;
      border-left: 1px dashed var(--line);
    }

    .root-connectors::after {
      content: "";
      position: absolute;
      top: 9px;
      left: 34%;
      right: 16%;
      border-top: 1px dashed var(--line);
    }

    .root-connectors span::before,
    .root-connectors span::after {
      content: "";
      position: absolute;
      top: 9px;
      height: 9px;
      border-left: 1px dashed var(--line);
    }

    .root-connectors span::before { left: 34%; }
    .root-connectors span::after { right: 16%; }

    .core-branches {
      display: grid;
      grid-template-columns: minmax(0, 2.08fr) minmax(300px, 0.92fr);
      gap: 12px;
      min-width: 0;
    }

    .branch-panel {
      min-width: 0;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.36);
    }

    .branch-connector {
      position: relative;
      height: 16px;
    }

    .branch-connector::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 0;
      height: 8px;
      border-left: 1px dashed var(--line);
    }

    .branch-connector.split::after {
      content: "";
      position: absolute;
      top: 8px;
      left: 25%;
      right: 25%;
      border-top: 1px dashed var(--line);
    }

    .branch-connector.split span::before,
    .branch-connector.split span::after {
      content: "";
      position: absolute;
      top: 8px;
      height: 8px;
      border-left: 1px dashed var(--line);
    }

    .branch-connector.split span::before { left: 25%; }
    .branch-connector.split span::after { right: 25%; }

    .revenue-splits {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 10px;
    }

    .metric-group {
      border-radius: 9px;
      overflow: hidden;
      min-width: 0;
    }

    .metric-group .summary-card { border: 0; box-shadow: none; border-radius: 0; background: var(--surface-soft); }

    .platform-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      border-top: 1px solid var(--line-soft);
    }

    .platform-card {
      position: relative;
      min-width: 0;
      min-height: 70px;
      padding: 9px 10px 8px;
      border: 0;
      border-right: 1px solid var(--line-soft);
      box-shadow: none;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      column-gap: 8px;
      align-items: start;
    }

    .platform-card:last-child { border-right: 0; }

    .platform-card .platform-mark { margin-top: 1px; }

    .platform-card-content { min-width: 0; text-align: right; }

    .platform-metric-label {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text-secondary);
      font-size: 11px;
      line-height: 1.2;
      white-space: nowrap;
    }

    .platform-value {
      display: block;
      margin-top: 2px;
      font-size: 17px;
      line-height: 1.15;
      font-weight: 620;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .platform-card .delta {
      display: block;
      margin-top: 3px;
      font-size: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .signal-badge {
      display: inline-flex;
      margin-top: 4px;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--badge);
      color: #fff;
      font-size: 10px;
      line-height: 1.2;
      box-shadow: 0 2px 7px rgba(245, 108, 120, 0.22);
    }

    .take-panel .platform-card { min-height: 94px; padding-top: 13px; }
    .take-panel .platform-metric-label { display: none; }
    .take-panel .platform-value { font-size: 18px; }

    .funnels-wrap { position: relative; padding-top: 17px; }

    .funnels-wrap::before {
      content: "";
      position: absolute;
      top: 0;
      left: 16.666%;
      right: 16.666%;
      border-top: 1px dashed var(--line);
    }

    .funnels {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .funnel-lane {
      position: relative;
      min-width: 0;
      border-radius: 10px;
      overflow: visible;
      background: rgba(255, 255, 255, 0.78);
    }

    .funnel-lane::before {
      content: "";
      position: absolute;
      top: -17px;
      left: 50%;
      height: 17px;
      border-left: 1px dashed var(--line);
    }

    .funnel-lane[data-platform="yellow"] { border-top: 3px solid var(--yellow); }
    .funnel-lane[data-platform="taobao"] { border-top: 3px solid var(--orange); }
    .funnel-lane[data-platform="red"] { border-top: 3px solid var(--red); }

    .funnel-head {
      min-height: 35px;
      padding: 7px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border-bottom: 1px solid var(--line-soft);
      background: var(--surface-soft);
      border-radius: 8px 8px 0 0;
    }

    .funnel-title { display: flex; align-items: center; gap: 7px; min-width: 0; font-size: 13px; font-weight: 650; }
    .formula-note { color: var(--text-muted); font-size: 10px; white-space: nowrap; }

    .funnel-steps { padding: 7px; display: grid; gap: 9px; }

    .formula-row {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.15fr);
      gap: 6px;
    }

    .formula-row + .formula-row::before {
      content: "";
      position: absolute;
      top: -9px;
      left: 50%;
      height: 9px;
      border-left: 1px dashed var(--line);
    }

    .factor-card {
      min-width: 0;
      min-height: 66px;
      padding: 8px 9px;
      border: 1px solid var(--line-soft);
      border-radius: 7px;
      background: var(--surface);
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 7px;
      align-items: center;
    }

    .factor-card.result { background: linear-gradient(135deg, #fff 0%, #fafbfc 100%); }
    .factor-card .platform-mark { width: 22px; height: 22px; font-size: 10px; border-radius: 6px; }
    .factor-card .platform-mark.circle { border-radius: 50%; }
    .factor-copy { min-width: 0; text-align: right; }
    .factor-label { display: block; color: var(--text-secondary); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .factor-value { display: block; margin-top: 2px; font-size: 15px; line-height: 1.1; font-weight: 620; font-variant-numeric: tabular-nums; white-space: nowrap; }
    .factor-card .delta { display: block; margin-top: 3px; font-size: 10px; overflow: hidden; text-overflow: ellipsis; }
    .factor-card .signal-badge { margin-top: 3px; }

    .report-footer {
      min-height: 26px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      color: var(--text-muted);
      font-size: 10px;
    }

    .footer-key { display: flex; align-items: center; gap: 12px; }
    .footer-dot { display: inline-block; width: 6px; height: 6px; margin-right: 4px; border-radius: 50%; vertical-align: 1px; }
    .footer-dot.positive { background: var(--positive); }
    .footer-dot.negative { background: var(--negative); }
    .footer-dot.neutral { background: var(--text-muted); }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 1439px) {
      .report-shell { padding: 16px 18px 12px; }
      .report-header { min-height: 52px; }
      .metric-tree { gap: 8px; }
      .root-card { min-height: 60px; }
      .summary-card { min-height: 52px; padding: 9px 12px; gap: 10px; }
      .summary-label { font-size: 13px; }
      .root-card .summary-label { font-size: 14px; }
      .summary-value { font-size: 23px; }
      .branch-card .summary-value { font-size: 21px; }
      .summary-card .delta { font-size: 11px; }
      .platform-card { min-height: 62px; padding: 7px; column-gap: 6px; }
      .platform-mark { width: 22px; height: 22px; font-size: 10px; }
      .platform-value { font-size: 15px; }
      .platform-card .delta { font-size: 9px; }
      .take-panel .platform-card { min-height: 80px; }
      .funnels-wrap { padding-top: 14px; }
      .funnels-wrap::before { top: 0; }
      .funnel-lane::before { top: -14px; height: 14px; }
      .funnel-steps { padding: 5px; gap: 6px; }
      .formula-row { gap: 4px; }
      .formula-row + .formula-row::before { top: -6px; height: 6px; }
      .factor-card { min-height: 57px; padding: 6px; gap: 5px; }
      .factor-card .platform-mark { width: 19px; height: 19px; }
      .factor-label { font-size: 9px; }
      .factor-value { font-size: 13px; }
      .factor-card .delta { font-size: 8px; }
      .funnel-head { min-height: 31px; padding: 5px 8px; }
      .report-footer { min-height: 20px; }
    }

    @media (max-width: 899px) {
      .report-shell { padding: 16px 12px; }
      .report-header { align-items: flex-start; min-height: auto; margin-bottom: 16px; }
      .platform-legend { display: none; }
      .metric-tree { display: block; }
      .root-wrap { margin-bottom: 12px; }
      .summary-card.root-card { width: 100%; }
      .tree-connectors,
      .branch-connector,
      .funnels-wrap::before,
      .funnel-lane::before,
      .formula-row + .formula-row::before { display: none; }
      .core-branches { display: grid; grid-template-columns: 1fr; gap: 12px; }
      .revenue-splits { grid-template-columns: 1fr; gap: 10px; }
      .platform-row { grid-template-columns: 1fr; }
      .platform-card { min-height: 66px; border-right: 0; border-bottom: 1px solid var(--line-soft); }
      .platform-card:last-child { border-bottom: 0; }
      .take-panel .platform-card { min-height: 66px; }
      .funnels-wrap { padding-top: 12px; }
      .funnels { grid-template-columns: 1fr; gap: 12px; }
      .funnel-lane { overflow: hidden; }
      .funnel-steps { padding: 8px; gap: 8px; }
      .formula-row { grid-template-columns: 1fr 1fr; gap: 8px; }
      .factor-card { min-height: 68px; }
      .factor-label { font-size: 11px; }
      .factor-value { font-size: 15px; }
      .factor-card .delta { font-size: 10px; }
      .report-footer { margin-top: 14px; flex-direction: column; align-items: flex-start; }
    }

    @media (max-width: 430px) {
      h1 { font-size: 23px; }
      .summary-card { flex-wrap: wrap; justify-content: flex-start; column-gap: 10px; }
      .summary-card .delta { width: 100%; padding-left: 0; }
      .platform-card-content { text-align: left; }
      .formula-row { grid-template-columns: 1fr; }
      .factor-copy { text-align: left; }
    }
  </style>
</head>
<body>
  <main class="report-shell">
    <header class="report-header">
      <div>
        <p class="eyebrow">Business Performance Overview</p>
        <h1>核心指标拆解分析</h1>
        <p class="subtitle">核心经营指标与平台贡献拆解</p>
      </div>
      <nav class="platform-legend" aria-label="平台图例">
        <span class="legend-item"><span class="platform-mark rabbit" aria-hidden="true">兔</span>黄色平台</span>
        <span class="legend-item"><span class="platform-mark square" aria-hidden="true">淘</span>淘宝闪购</span>
        <span class="legend-item"><span class="platform-mark circle" aria-hidden="true">红</span>红色平台</span>
      </nav>
    </header>

    <section class="metric-tree" aria-label="核心指标拆解树">
      <div class="root-wrap" id="root-metric"></div>
      <div class="tree-connectors root-connectors" aria-hidden="true"><span></span></div>

      <div class="core-branches">
        <section class="branch-panel revenue-panel" aria-label="营业额拆解">
          <div id="revenue-summary"></div>
          <div class="branch-connector split" aria-hidden="true"><span></span></div>
          <div class="revenue-splits">
            <article class="metric-group" aria-label="客单价拆解">
              <div id="avg-price-summary"></div>
              <div class="platform-row" id="avg-price-platforms"></div>
            </article>
            <article class="metric-group" aria-label="有效订单拆解">
              <div id="orders-summary"></div>
              <div class="platform-row" id="orders-platforms"></div>
            </article>
          </div>
        </section>

        <section class="branch-panel take-panel" aria-label="到手率拆解">
          <div id="take-rate-summary"></div>
          <div class="branch-connector" aria-hidden="true"></div>
          <article class="metric-group">
            <div class="platform-row" id="take-rate-platforms"></div>
          </article>
        </section>
      </div>

      <section class="funnels-wrap" aria-label="平台转化链路">
        <div class="funnels" id="platform-funnels"></div>
      </section>
    </section>

    <footer class="report-footer">
      <span>数据按截图原样展示，缺失值不推测补录</span>
      <span class="footer-key">
        <span><i class="footer-dot positive"></i>增长</span>
        <span><i class="footer-dot negative"></i>下降</span>
        <span><i class="footer-dot neutral"></i>持平 / 缺失</span>
      </span>
    </footer>
  </main>

  <script>
    (() => {
      const data = Object.freeze(JSON.parse(document.getElementById('metrics-data').textContent));
      const platformKeys = ['yellow', 'taobao', 'red'];
      const metricLabels = {
        takeRate: '到手率',
        avgPrice: '客单价（原价）',
        orders: '有效订单',
        repeatOrders: '人均下单次数',
        orderUsers: '下单人数',
        orderRate: '下单转化率（人数）',
        visitors: '入店人数',
        visitRate: '入店转化率（人数）',
        exposure: '曝光人数'
      };

      const markerText = { yellow: '兔', taobao: '淘', red: '红' };

      function deltaMarkup(delta, tone) {
        return `<span class="delta ${tone}">${delta}</span>`;
      }

      function badgeMarkup(badge) {
        return badge ? `<span class="signal-badge">${badge}</span>` : '';
      }

      function markerMarkup(key) {
        const platform = data.platforms[key];
        return `<span class="platform-mark ${platform.marker}" aria-hidden="true">${markerText[key]}</span><span class="sr-only">${platform.label}</span>`;
      }

      function summaryMarkup(id, extraClass = '') {
        const [label, value, delta, tone] = data.summaries[id];
        return `<article class="summary-card ${extraClass}" data-summary-id="${id}">
          <span class="summary-label">${label}</span>
          <strong class="summary-value">${value}</strong>
          ${deltaMarkup(delta, tone)}
        </article>`;
      }

      function platformMetricMarkup(key, metricId, mode = 'standard') {
        const [value, delta, tone, badge] = data.platforms[key].metrics[metricId];
        return `<article class="platform-card ${mode}" data-platform="${key}" data-metric="${metricId}" aria-label="${data.platforms[key].label} ${metricLabels[metricId]}">
          ${markerMarkup(key)}
          <div class="platform-card-content">
            <span class="platform-metric-label">${metricLabels[metricId]}</span>
            <strong class="platform-value">${value}</strong>
            ${deltaMarkup(delta, tone)}
            ${badgeMarkup(badge)}
          </div>
        </article>`;
      }

      function factorCardMarkup(key, metricId, result = false) {
        const [value, delta, tone, badge] = data.platforms[key].metrics[metricId];
        return `<article class="factor-card ${result ? 'result' : ''}" data-platform="${key}" data-metric="${metricId}" aria-label="${data.platforms[key].label} ${metricLabels[metricId]}">
          ${markerMarkup(key)}
          <div class="factor-copy">
            <span class="factor-label">${metricLabels[metricId]}</span>
            <strong class="factor-value">${value}</strong>
            ${deltaMarkup(delta, tone)}
            ${badgeMarkup(badge)}
          </div>
        </article>`;
      }

      function renderPlatformRow(targetId, metricId) {
        document.getElementById(targetId).innerHTML = platformKeys
          .map((key) => platformMetricMarkup(key, metricId))
          .join('');
      }

      function funnelMarkup(key) {
        const platform = data.platforms[key];
        const rows = [
          ['repeatOrders', 'orderUsers'],
          ['orderRate', 'visitors'],
          ['visitRate', 'exposure']
        ];
        return `<article class="funnel-lane" data-platform="${key}">
          <header class="funnel-head">
            <span class="funnel-title">${markerMarkup(key)}${platform.label}</span>
            <span class="formula-note">转化 × 人数</span>
          </header>
          <div class="funnel-steps">
            ${rows.map(([factor, result]) => `<div class="formula-row">${factorCardMarkup(key, factor)}${factorCardMarkup(key, result, true)}</div>`).join('')}
          </div>
        </article>`;
      }

      document.getElementById('root-metric').innerHTML = summaryMarkup('income', 'root-card');
      document.getElementById('revenue-summary').innerHTML = summaryMarkup('revenue', 'branch-card');
      document.getElementById('take-rate-summary').innerHTML = summaryMarkup('takeRate', 'branch-card');
      document.getElementById('avg-price-summary').innerHTML = summaryMarkup('avgPrice', 'branch-card');
      document.getElementById('orders-summary').innerHTML = summaryMarkup('orders', 'branch-card');

      renderPlatformRow('avg-price-platforms', 'avgPrice');
      renderPlatformRow('orders-platforms', 'orders');
      renderPlatformRow('take-rate-platforms', 'takeRate');
      document.getElementById('platform-funnels').innerHTML = platformKeys.map(funnelMarkup).join('');
    })();
  </script>
</body>
</html>
